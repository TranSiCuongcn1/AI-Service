services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_service
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_service"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: ai_service_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/ai_service
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed_products.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  adminer:
    image: adminer:latest
    container_name: ai_db_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
